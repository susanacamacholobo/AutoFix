<div class="registro-container">
  <div class="registro-card">

    <div class="registro-header">
      <h1>AutoFix</h1>
      <p>Crear cuenta de conductor</p>
    </div>

    <div class="registro-form">
      <h2>Registro</h2>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="datos.nombre" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" [(ngModel)]="datos.apellido" placeholder="Tu apellido" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="datos.email" placeholder="tucorreo@gmail.com" />
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" [(ngModel)]="datos.telefono" placeholder="78901234" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-password">
          <input
            [type]="mostrarContrasena ? 'text' : 'password'"
            [(ngModel)]="datos.contrasena"
            placeholder="••••••••"
          />
          <button class="btn-ojo" (click)="toggleContrasena()" type="button">
            <span class="material-icons">
              {{ mostrarContrasena ? 'visibility' : 'visibility_off' }}
            </span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <div class="input-password">
          <input
            [type]="mostrarContrasena ? 'text' : 'password'"
            [(ngModel)]="datos.confirmar_contrasena"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="error-message" *ngIf="error">{{ error }}</div>
      <div class="success-message" *ngIf="exito">{{ exito }}</div>

      <button (click)="registrarse()" [disabled]="cargando" class="btn-registro">
        {{ cargando ? 'Creando cuenta...' : 'Crear Cuenta' }}
      </button>

      <div class="login-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </div>

    </div>
  </div>
</div>
